<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2Dシューティングゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- タイトル画面 -->
    <div id="titleScreen" class="screen active">
        <div class="title-background">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
        <div class="coin-display" id="titleCoinDisplay">🪙 0</div>
        <div class="screen-content">
            <div class="title-wrapper">
                <h1 class="game-title" id="titleLogo">BSK SHOOTING</h1>
                <div class="title-subtitle">Get Ready for Battle!</div>
            </div>
            <div class="input-group">
                <label for="playerName">
                    <span class="label-icon">👤</span>
                    プレイヤー名
                </label>
                <input type="text" id="playerName" placeholder="あなたの名前を入力..." maxlength="20">
            </div>
            <div class="title-buttons">
                <button id="changeSkinButton" class="button button-secondary">
                    <span class="button-text">CHANGE SKIN</span>
                </button>
                <button id="skillEquipButton" class="button button-secondary">
                    <span class="button-text">SKILL EQUIP</span>
                </button>
                <button id="startButton" class="button">
                    <span class="button-text">START GAME</span>
                    <span class="button-arrow">→</span>
                </button>
            </div>
            <div class="title-menu" id="titleMenu">
                <button id="titleStartMenu" class="menu-item selected">START</button>
                <button id="titleShopMenu" class="menu-item">SHOP</button>
                <button id="titleSettingMenu" class="menu-item">SETTING</button>
            </div>
        </div>
    </div>

    <!-- キャラクター選択画面 -->
    <div id="characterSelectScreen" class="screen">
        <div class="screen-content character-select-content">
            <h1 style="color: #fff; margin-bottom: 24px;">キャラクター選択</h1>
            <div class="character-preview-wrap">
                <img id="characterSelectPreview" class="character-preview" src="char/player/Hiroto.png" alt="プレビュー">
            </div>
            <div class="character-select-bar" id="characterSelectList"></div>
            <div class="character-select-actions">
                <button id="characterSelectButton" class="button">SELECT</button>
            </div>
            <button id="backFromCharacterSelect" class="button button-secondary" style="margin-top: 16px;">戻る</button>
        </div>
    </div>

    <!-- 難易度選択画面 -->
    <div id="difficultyScreen" class="screen">
        <div class="screen-content">
            <h1 style="color: #fff; margin-bottom: 40px;">難易度を選択</h1>
            <div class="difficulty-buttons">
                <button id="easyButton" class="difficulty-button" data-difficulty="easy">
                    <span class="difficulty-title">イージーモード</span>
                    <span class="difficulty-desc">敵HP: 2<br>接触回数: 4回まで</span>
                </button>
                <button id="normalButton" class="difficulty-button" data-difficulty="normal">
                    <span class="difficulty-title">ノーマルモード</span>
                    <span class="difficulty-desc">敵HP: 5<br>接触回数: 1回でゲームオーバー</span>
                </button>
                <button id="hardButton" class="difficulty-button" data-difficulty="hard">
                    <span class="difficulty-title">ハードモード</span>
                    <span class="difficulty-desc">敵HP: 7<br>接触回数: 1回でゲームオーバー<br>高速モード</span>
                </button>
                <!-- 隠し難易度「國」ボタン（初期は非表示） -->
                <button id="kuniButton" class="difficulty-button hidden-difficulty" data-difficulty="kuni">
                    <span class="difficulty-title">國モード</span>
                    <span class="difficulty-desc">敵HP: 10<br>接触回数: 1回でゲームオーバー<br>超高速モード（隠し）</span>
                </button>
            </div>
            <button id="backToTitleFromDifficulty" class="button" style="margin-top: 30px;">タイトルへ戻る</button>
        </div>
    </div>

    <!-- ショップ画面 -->
    <div id="shopScreen" class="screen">
        <div class="screen-content shop-content">
            <div class="coin-display" id="shopCoinDisplay">🪙 0</div>
            <h1 style="color: #fff; margin-bottom: 16px;">SHOP</h1>
            <div class="shop-tabs">
                <button id="shopTabSkill" class="shop-tab selected">SKILL</button>
                <button id="shopTabSkin" class="shop-tab">SKIN</button>
            </div>
            <div id="shopItemList" class="shop-item-list"></div>
            <div id="shopMessage" class="shop-message"></div>
            <button id="backFromShopButton" class="button button-secondary">タイトルへ戻る</button>
        </div>
        <div id="purchaseDialog" class="dialog hidden">
            <div class="dialog-content">
                <p>購入しますか？</p>
                <div class="dialog-actions">
                    <button id="purchaseYesButton" class="button">YES</button>
                    <button id="purchaseNoButton" class="button button-secondary">NO</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 設定画面 -->
    <div id="settingScreen" class="screen">
        <div class="screen-content setting-content">
            <h1 style="color:#fff;">SETTING</h1>
            <div class="setting-item selected" data-setting="bgm">
                <span>BGM</span>
                <span id="bgmValue">70%</span>
                <div class="setting-bar"><div id="bgmBar"></div></div>
            </div>
            <div class="setting-item" data-setting="se">
                <span>SE</span>
                <span id="seValue">70%</span>
                <div class="setting-bar"><div id="seBar"></div></div>
            </div>
            <button id="saveSettingButton" class="button">保存</button>
            <button id="cancelSettingButton" class="button button-secondary">キャンセル</button>
            <button id="backFromSettingButton" class="button button-secondary">タイトルへ戻る</button>
        </div>
    </div>

    <!-- スキル装備画面 -->
    <div id="skillEquipScreen" class="screen">
        <div class="screen-content skill-equip-content">
            <h1 style="color:#fff;">SKILL EQUIP</h1>
            <div class="skill-equip-layout">
                <div>
                    <h3 style="color:#fff;">所持スキル</h3>
                    <div id="skillEquipList" class="shop-item-list"></div>
                </div>
                <div>
                    <h3 style="color:#fff;">装備スロット</h3>
                    <div id="skillEquipSlots" class="equip-slots"></div>
                    <button id="unequipSkillButton" class="button button-secondary">外す</button>
                </div>
            </div>
            <div id="skillEquipMessage" class="shop-message"></div>
            <button id="backFromSkillEquipButton" class="button button-secondary">SHOPへ戻る</button>
        </div>
    </div>

    <!-- ゲーム画面 -->
    <div id="gameScreen" class="screen">
        <canvas id="gameCanvas"></canvas>
        <div id="scoreDisplay">スコア: 0</div>
        <div id="skillSlots" class="skill-slots">
            <div class="skill-slot" id="skillSlot1"><span class="skill-name">SLOT1</span><div class="cooldown"><div class="cooldown-fill" id="cooldown1"></div></div></div>
            <div class="skill-slot" id="skillSlot2"><span class="skill-name">SLOT2</span><div class="cooldown"><div class="cooldown-fill" id="cooldown2"></div></div></div>
        </div>
        <div id="attackHint" class="attack-hint">Jキー: 攻撃</div>
        <div id="upgradeOverlay" class="upgrade-overlay hidden">
            <div class="upgrade-panel">
                <h3>強化を選択</h3>
                <div id="upgradeChoices" class="upgrade-choices"></div>
            </div>
        </div>
    </div>

    <!-- リザルト画面 -->
    <div id="resultScreen" class="screen">
        <div class="screen-content">
            <h1>クリアタイムランキング</h1>
            <div id="clearBonusDisplay" class="clear-bonus"></div>
            <div id="scoreList" class="score-list"></div>
            <button id="backToTitleButton" class="button">タイトルへ戻る</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
